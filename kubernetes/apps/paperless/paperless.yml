apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      containers:
      - name: paperless
        image: ghcr.io/paperless-ngx/paperless-ngx:latest
        ports:
        - containerPort: 8000
        env:
        - name: PAPERLESS_REDIS
          value: redis://redis-paperless:6379
        - name: PAPERLESS_DBHOST
          value: postgres-paperless
        - name: PAPERLESS_DBNAME
          value: paperless
        - name: PAPERLESS_DBUSER
          value: paperless
        - name: PAPERLESS_DBPASS
          value: TD3fAJ2s1cxJ
        - name: PAPERLESS_OCR_LANGUAGE
          value: deu+eng
        - name: PAPERLESS_TIME_ZONE
          value: Europe/Berlin
        - name: PAPERLESS_TIKA_ENABLED
          value: "1"
        - name: PAPERLESS_TIKA_ENDPOINT
          value: http://paperless-addons:9998
        - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
          value: http://paperless-addons:3000
        - name: PAPERLESS_PORT
          value: "8000"
        - name: PAPERLESS_URL
          value: https://docs.woitzik.dev
        - name: PAPERLESS_ALLOWED_HOSTS
          value: docs.woitzik.dev,auth.woitzik.dev,10.0.20.200,10.0.20.11,10.0.20.12,10.0.20.13
        - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
          value: https://docs.woitzik.dev,https://auth.woitzik.dev
        - name: PAPERLESS_TRUSTED_PROXIES
          value: 10.42.0.0/16,10.43.0.0/16,10.0.20.0/24
        - name: PAPERLESS_ENABLE_HTTP_REMOTE_USER
          value: "true"
        - name: PAPERLESS_HTTP_REMOTE_USER_HEADER_NAME
          value: HTTP_REMOTE_USER
        - name: PAPERLESS_ACCOUNT_ALLOW_SIGNUPS
          value: "false"
        volumeMounts:
        - name: data
          mountPath: /usr/src/paperless/data
        - name: media
          mountPath: /usr/src/paperless/media
        - name: export
          mountPath: /usr/src/paperless/export
        - name: consume
          mountPath: /usr/src/paperless/consume
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: paperless-data
      - name: media
        persistentVolumeClaim:
          claimName: paperless-media
      - name: export
        emptyDir: {}
      - name: consume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: paperless
  namespace: apps
spec:
  ports:
  - port: 8000
  selector:
    app: paperless
