apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: apps
data:
  config.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sled"

    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "garage.apps.svc.cluster.local:3901"
    rpc_secret = "generate_this_locally_if_needed"

    [s3_api]
    s3_region = "homelab"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.woitzik.dev"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.s3.woitzik.dev"

    [admin]
    admin_bind_addr = "[::]:3903"
    admin_token = "homelab-admin-token"
