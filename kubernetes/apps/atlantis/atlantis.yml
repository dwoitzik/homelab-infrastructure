apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlantis-data
  namespace: apps
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atlantis-config
  namespace: apps
data:
  repos.yaml: |
    repos:
      - id: github.com/dwoitzik/homelab-infrastructure
        allowed_overrides: [workflow]
        allow_custom_workflows: false
    workflows:
      default:
        plan:
          steps:
            - init
            - plan
        apply:
          steps:
            - apply
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlantis
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlantis
  template:
    metadata:
      labels:
        app: atlantis
    spec:
      containers:
      - name: atlantis
        image: ghcr.io/runatlantis/atlantis:v0.33.0
        ports:
        - containerPort: 4141
        env:
        - name: ATLANTIS_ATLANTIS_URL
          value: https://atlantis.woitzik.dev
        - name: ATLANTIS_PORT
          value: "4141"
        - name: ATLANTIS_REPO_ALLOWLIST
          value: github.com/dwoitzik/homelab-infrastructure
        - name: ATLANTIS_ALLOW_TF_VERSION_DOWNLOAD
          value: "false"
        - name: ATLANTIS_TERRAFORM_VERSION
          value: 1.10.0
        - name: ATLANTIS_GH_USER
          value: dwoitzik
        - name: ATLANTIS_GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: gh-token
        - name: ATLANTIS_GH_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: gh-webhook-secret
        - name: TF_VAR_mikrotik_url
          value: https://10.0.10.1
        - name: TF_VAR_mikrotik_user
          value: terraform
        - name: TF_VAR_mikrotik_password
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: mikrotik-password
        - name: TF_VAR_mikrotik_insecure
          value: "true"
        - name: AWS_ACCESS_KEY_ID
          value: dwoitzik
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: aws-secret-access-key
        - name: TF_VAR_proxmox_api_url
          value: https://10.0.10.10:8006/api2/json
        - name: TF_VAR_proxmox_api_token_id
          value: terraform@pve!atlantis
        - name: TF_VAR_proxmox_api_token_secret
          valueFrom:
            secretKeyRef:
              name: atlantis-secrets
              key: proxmox-api-token-secret
        volumeMounts:
        - name: data
          mountPath: /home/atlantis
        - name: config
          mountPath: /etc/atlantis/repos.yaml
          subPath: repos.yaml
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: atlantis-data
      - name: config
        configMap:
          name: atlantis-config
---
apiVersion: v1
kind: Service
metadata:
  name: atlantis
  namespace: apps
spec:
  ports:
  - port: 4141
  selector:
    app: atlantis
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlantis-ingress
  namespace: apps
spec:
  rules:
  - host: atlantis.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlantis
            port:
              number: 4141
