apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`home.woitzik.dev`)
    kind: Rule
    middlewares: [{name: authelia}]
    services: [{name: homepage, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
