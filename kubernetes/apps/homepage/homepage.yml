apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: apps
data:
  services.yaml: |
    - Infrastructure:
        - Proxmox:
            icon: proxmox.png
            href: https://10.0.10.10:8006
            description: Virtualization Platform
        - PBS:
            icon: proxmox.png
            href: https://10.0.10.110:8007
            description: Proxmox Backup Server
        - Router:
            icon: mikrotik.png
            href: https://router.woitzik.dev
            description: MikroTik RB5009
    - Cloud Native:
        - ArgoCD:
            icon: argocd.png
            href: https://argo.woitzik.dev
            description: GitOps Controller
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.woitzik.dev
            description: Distributed Block Storage
        - Traefik:
            icon: traefik.png
            href: https://traefik.woitzik.dev
            description: Edge Router
    - Core Apps:
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vault.woitzik.dev
            description: Password Manager
        - Authelia:
            icon: authelia.png
            href: https://auth.woitzik.dev
            description: Identity Provider
        - AdGuard A:
            icon: adguard-home.png
            href: http://10.0.20.2:3001
            description: DNS Filter Node 01
        - AdGuard B:
            icon: adguard-home.png
            href: http://10.0.20.3:3001
            description: DNS Filter Node 02
    - Productivity:
        - Paperless:
            icon: paperless.png
            href: https://docs.woitzik.dev
            description: Document Management
        - Minio:
            icon: minio.png
            href: https://minio.woitzik.dev
            description: S3 Object Storage
        - Open WebUI:
            icon: open-webui.png
            href: https://ai.woitzik.dev
            description: LLM Interface
    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://monitoring.woitzik.dev
            description: Cluster Metrics
        - Mikrodash:
            icon: mikrotik.png
            href: https://mikrodash.woitzik.dev
            description: Router Dashboard
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showNodes: true
        nodes:
          - name: vm-srv-k3s-11
          - name: vm-srv-k3s-12
          - name: vm-srv-k3s-13
          - name: rpi-srv-01
          - name: rpi-srv-02
  layout.yaml: |
    Infrastructure:
      style: grid
      columns: 3
    Cloud Native:
      style: grid
      columns: 3
    Core Apps:
      style: grid
      columns: 4
    Productivity:
      style: grid
      columns: 3
    Monitoring:
      style: grid
      columns: 2
  settings.yaml: |
    title: David's Homelab
    background: https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=2850&q=80
    cardBlur: sm
    theme: dark
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_VAR_GRAFANA_ADMIN_PASSWORD
          value: "REPLACE_ME"
        volumeMounts:
        - name: config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: config
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: config
          mountPath: /app/config/layout.yaml
          subPath: layout.yaml
        - name: config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: logs
          mountPath: /app/config/logs
      volumes:
      - name: config
        configMap:
          name: homepage-config
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: apps
spec:
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: homepage
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: apps
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: apps-authelia@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: home.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage
            port:
              number: 80
