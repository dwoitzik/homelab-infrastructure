apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: apps
data:
  services.yaml: |
    - Infrastructure:
        - Proxmox:
            icon: proxmox.png
            href: https://pve.woitzik.dev
        - PBS:
            icon: proxmox.png
            href: https://backup.woitzik.dev
        - Router:
            icon: mikrotik.png
            href: https://router.woitzik.dev
    - Cloud Native:
        - ArgoCD:
            icon: argocd.png
            href: https://argo.woitzik.dev
            widget:
              type: argocd
              url: http://argocd-server.argocd.svc.cluster.local
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.woitzik.dev
        - Traefik:
            icon: traefik.png
            href: https://traefik.woitzik.dev
            widget:
              type: traefik
              url: http://traefik.kube-system.svc.cluster.local:9000
    - Core Apps:
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vault.woitzik.dev
        - Authelia:
            icon: authelia.png
            href: https://auth.woitzik.dev
        - AdGuard:
            icon: adguard-home.png
            href: https://dns.woitzik.dev
    - Productivity:
        - Paperless:
            icon: paperless.png
            href: https://docs.woitzik.dev
        - Minio:
            icon: minio.png
            href: https://minio.woitzik.dev
        - Open WebUI:
            icon: open-webui.png
            href: https://ai.woitzik.dev
    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://monitoring.woitzik.dev
        - Mikrodash:
            icon: mikrotik.png
            href: https://mikrodash.woitzik.dev
  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long
  layout.yaml: |
    Infrastructure:
      style: grid
      columns: 3
    Cloud Native:
      style: grid
      columns: 3
    Core Apps:
      style: grid
      columns: 3
    Productivity:
      style: grid
      columns: 3
    Monitoring:
      style: grid
      columns: 2
  settings.yaml: |
    title: David's Homelab
    background: "#000000"
    theme: dark
    color: orange
    hideHostname: true
    hideConfig: true
  custom.css: |
    :root {
      --bg-color: #000000;
      --card-bg-color: #050505;
      --accent-color: #FF8C00;
      --text-color: #E0E0E0;
    }
    body { background-color: var(--bg-color) !important; background-image: none !important; }
    .card { background-color: var(--card-bg-color) !important; border: 1px solid #1a1a1a !important; }
    h1, h2, h3, h4, span, div { color: var(--text-color); }
    .text-orange-500, .text-accent { color: var(--accent-color) !important; }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "home.woitzik.dev"
        volumeMounts:
        - name: config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: config
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: config
          mountPath: /app/config/layout.yaml
          subPath: layout.yaml
        - name: config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: config
          mountPath: /app/config/custom.css
          subPath: custom.css
        - name: logs
          mountPath: /app/config/logs
      volumes:
      - name: config
        configMap:
          name: homepage-config
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: apps
spec:
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: homepage
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: apps
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: apps-authelia@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: home.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage
            port:
              number: 80
