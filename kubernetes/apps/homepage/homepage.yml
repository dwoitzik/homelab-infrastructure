apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: apps
data:
  services.yaml: |
    - Infrastructure:
        - Proxmox:
            icon: proxmox.png
            href: https://pve.woitzik.dev
            description: Virtualization Platform
        - PBS:
            icon: proxmox.png
            href: https://backup.woitzik.dev
            description: Proxmox Backup Server
        - Router:
            icon: mikrotik.png
            href: https://router.woitzik.dev
            description: MikroTik RB5009
    - Cloud Native:
        - ArgoCD:
            icon: argocd.png
            href: https://argo.woitzik.dev
            widget:
              type: argocd
              url: http://argocd-server.argocd.svc.cluster.local
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.woitzik.dev
        - Traefik:
            icon: traefik.png
            href: https://traefik.woitzik.dev
            widget:
              type: traefik
              url: http://traefik.kube-system.svc.cluster.local:9000
    - Core Apps:
        - Vaultwarden:
            icon: vaultwarden.png
            href: https://vault.woitzik.dev
        - Authelia:
            icon: authelia.png
            href: https://auth.woitzik.dev
        - AdGuard:
            icon: adguard-home.png
            href: https://dns.woitzik.dev
    - Productivity:
        - Paperless:
            icon: paperless.png
            href: https://docs.woitzik.dev
        - Minio:
            icon: minio.png
            href: https://minio.woitzik.dev
        - Open WebUI:
            icon: open-webui.png
            href: https://ai.woitzik.dev
    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://monitoring.woitzik.dev
        - Mikrodash:
            icon: mikrotik.png
            href: https://mikrodash.woitzik.dev
  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long
  layout.yaml: |
    Infrastructure:
      style: grid
      columns: 3
    Cloud Native:
      style: grid
      columns: 3
    Core Apps:
      style: grid
      columns: 3
    Productivity:
      style: grid
      columns: 3
    Monitoring:
      style: grid
      columns: 2
  settings.yaml: |
    title: David's Homelab
    theme: dark
    color: slate
    layout:
      header:
        style: grid
        columns: 4
    hideHostname: true
    hideConfig: true
  custom.css: |
    body {
      background: radial-gradient(circle at top, #141414 0%, #050505 100%) !important;
      color: #fafafa !important;
      font-family: 'Inter', system-ui, sans-serif !important;
    }
    .grid { gap: 1.5rem !important; }
    .card {
      background: rgba(25, 25, 25, 0.4) !important;
      backdrop-filter: blur(12px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      border-radius: 16px !important;
      padding: 1.25rem !important;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }
    .card:hover {
      border-color: rgba(230, 126, 34, 0.6) !important;
      transform: scale(1.02) translateY(-4px) !important;
      background: rgba(40, 40, 40, 0.6) !important;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1) !important;
    }
    .group-title {
      color: #888 !important;
      font-size: 0.8rem !important;
      font-weight: 800 !important;
      letter-spacing: 0.15em !important;
      margin: 2rem 0 1rem 0 !important;
      border-left: 3px solid #e67e22 !important;
      padding-left: 1rem !important;
      text-transform: uppercase !important;
    }
    .text-slate-500 { color: #777 !important; font-size: 0.85rem !important; }
    .icon {
      filter: grayscale(1) opacity(0.7) !important;
      transition: all 0.4s ease !important;
      width: 42px !important;
      height: 42px !important;
    }
    .card:hover .icon {
      filter: grayscale(0) opacity(1) !important;
      transform: rotate(-5deg) scale(1.1) !important;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "home.woitzik.dev"
        volumeMounts:
        - name: config
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: config
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: config
          mountPath: /app/config/layout.yaml
          subPath: layout.yaml
        - name: config
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: config
          mountPath: /app/config/custom.css
          subPath: custom.css
        - name: logs
          mountPath: /app/config/logs
      volumes:
      - name: config
        configMap:
          name: homepage-config
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: apps
spec:
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: homepage
