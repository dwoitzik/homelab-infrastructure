apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: apps
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      hostAliases:
      - ip: "10.43.98.177"
        hostnames:
        - "auth.woitzik.dev"
      containers:
      - name: minio
        image: quay.io/minio/minio:latest
        command: ["minio", "server", "/data", "--console-address", ":9001"]
        ports:
        - containerPort: 9000
        - containerPort: 9001
        env:
        - name: MINIO_IDENTITY_OPENID_ENABLE_authelia
          value: "on"
        - name: MINIO_ROOT_USER
          value: "dwoitzik"
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secrets
              key: root-password
        - name: MINIO_IDENTITY_OPENID_CONFIG_URL_authelia
          value: "https://auth.woitzik.dev/.well-known/openid-configuration"
        - name: MINIO_IDENTITY_OPENID_CLIENT_ID_authelia
          value: "minio"
        - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET_authelia
          value: "dubist1plebyakalb"
        - name: MINIO_IDENTITY_OPENID_SCOPES_authelia
          value: "openid,profile,email,groups"
        - name: MINIO_IDENTITY_OPENID_REDIRECT_URI_authelia
          value: "https://minio.woitzik.dev/oauth_callback"
        - name: MINIO_IDENTITY_OPENID_CLAIM_NAME_authelia
          value: "groups"
        - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME_authelia
          value: "Login with Authelia"
        - name: MINIO_SERVER_URL
          value: "https://s3.woitzik.dev"
        - name: MINIO_BROWSER_REDIRECT_URL
          value: "https://minio.woitzik.dev"
        - name: MINIO_BROWSER_LOGIN_ANIMATION
          value: "off"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: apps
spec:
  ports:
  - name: api
    port: 9000
  - name: console
    port: 9001
  selector:
    app: minio
