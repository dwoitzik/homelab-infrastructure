apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
      - name: vaultwarden
        image: vaultwarden/server:latest
        ports:
        - containerPort: 80
        env:
        - name: SIGNUPS_ALLOWED
          value: "true"
        volumeMounts:
        - name: vault-data
          mountPath: /data
      volumes:
      - name: vault-data
        persistentVolumeClaim:
          claimName: vaultwarden-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: apps
spec:
  selector:
    app: vaultwarden
  ports:
  - port: 80
    targetPort: 80
