apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 61.3.2
    chart: kube-prometheus-stack
    helm:
      values: |
        prometheusOperator:
          crds:
            enabled: false
        grafana:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - monitoring.woitzik.dev
            annotations:
              traefik.ingress.kubernetes.io/router.middlewares: apps-authelia@kubernetescrd
          adminPassword: "homelab-admin-2026"
          grafana.ini:
            server:
              domain: monitoring.woitzik.dev
              root_url: https://monitoring.woitzik.dev/
              serve_from_sub_path: false
            auth.proxy:
              enabled: true
              header_name: Remote-User
              header_property: username
              auto_sign_up: true
            security:
              allow_embedding: true
              cookie_samesite: lax
              cookie_secure: true
          additionalDataSources:
            - name: Prometheus-Internal
              type: prometheus
              url: http://prometheus-operated.monitoring.svc.cluster.local:9090
              access: proxy
              isDefault: true
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
