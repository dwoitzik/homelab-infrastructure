# ArgoCD
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-main
  namespace: argocd
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`argo.woitzik.dev`)
    kind: Rule
    services: [{name: argocd-server, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Grafana
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-main
  namespace: monitoring
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`monitoring.woitzik.dev`)
    kind: Rule
    services: [{name: kube-prometheus-stack-grafana, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Longhorn
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-main
  namespace: longhorn-system
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`longhorn.woitzik.dev`)
    kind: Rule
    middlewares: [{name: authelia, namespace: apps}]
    services: [{name: longhorn-frontend, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
