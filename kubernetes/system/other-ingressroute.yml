# ArgoCD
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-main
  namespace: argocd
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`argo.woitzik.dev`)
    kind: Rule
    services: [{name: argocd-server, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Grafana
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-main
  namespace: monitoring
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`monitoring.woitzik.dev`)
    kind: Rule
    services: [{name: kube-prometheus-stack-grafana, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Longhorn
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-main
  namespace: longhorn-system
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`longhorn.woitzik.dev`)
    kind: Rule
    middlewares: [{name: authelia, namespace: apps}]
    services: [{name: longhorn-frontend, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Router
apiVersion: v1
kind: Service
metadata:
  name: router-external
  namespace: apps
spec:
  type: ExternalName
  externalName: 10.0.10.1
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: router-main
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`router.woitzik.dev`)
    kind: Rule
    middlewares: [{name: authelia, namespace: apps}]
    services: [{name: router-external, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Loki Ingestion
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: loki-main
  namespace: monitoring
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`loki.woitzik.dev`)
    kind: Rule
    services: [{name: loki, port: 3100}]
  tls: {secretName: wildcard-woitzik-dev-tls}
