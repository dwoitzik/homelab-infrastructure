apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.traefik.io/traefik
    targetRevision: 27.0.2
    chart: traefik
    helm:
      values: |
        additionalArguments:
          - "--providers.kubernetescrd"
          - "--providers.kubernetesingress"
          - "--serverstransport.insecureskipverify=true"
          - "--api.dashboard=true"
          - "--entrypoints.websecure.forwardedHeaders.trustedIPs=10.42.0.0/16,10.0.0.0/8"
          - "--entrypoints.websecure.proxyProtocol.trustedIPs=10.42.0.0/16,10.0.0.0/8"
        ports:
          web:
            redirectTo:
              port: websecure
          websecure:
            tls:
              enabled: true
        logs:
          general:
            level: DEBUG
          access:
            enabled: true
        ingressRoute:
          dashboard:
            enabled: true
        tlsStore:
          default:
            defaultCertificate:
              secretName: wildcard-woitzik-dev-tls
        tolerations:
        - key: "storage"
          operator: "Equal"
          value: "sdcard"
          effect: "NoSchedule"
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                - key: node-type
                  operator: In
                  values:
                  - rpi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
