apiVersion: v1
kind: Service
metadata:
  name: external-router
  namespace: kube-system
spec:
  ports:
  - name: https
    port: 443
    targetPort: 443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-router
  namespace: kube-system
subsets:
- addresses:
  - ip: 10.0.10.1
  ports:
  - name: https
    port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: external-pve
  namespace: kube-system
spec:
  ports:
  - name: https
    port: 8006
    targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-pve
  namespace: kube-system
subsets:
- addresses:
  - ip: 10.0.10.10
  ports:
  - name: https
    port: 8006
---
apiVersion: v1
kind: Service
metadata:
  name: external-pbs
  namespace: kube-system
spec:
  ports:
  - name: https
    port: 8007
    targetPort: 8007
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-pbs
  namespace: kube-system
subsets:
- addresses:
  - ip: 10.0.10.110
  ports:
  - name: https
    port: 8007
---
apiVersion: v1
kind: Service
metadata:
  name: external-dns
  namespace: kube-system
spec:
  ports:
  - name: http
    port: 3001
    targetPort: 3001
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-dns
  namespace: kube-system
subsets:
- addresses:
  - ip: 10.0.20.2
  ports:
  - name: http
    port: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrastructure-https
  namespace: kube-system
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: apps-authelia@kubernetescrd
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: router.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: external-router
            port:
              name: https
  - host: pve.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: external-pve
            port:
              name: https
  - host: backup.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: external-pbs
            port:
              name: https
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrastructure-http
  namespace: kube-system
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: apps-authelia@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: dns.woitzik.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: external-dns
            port:
              name: http
