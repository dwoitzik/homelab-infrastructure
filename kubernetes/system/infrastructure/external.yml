# PVE
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: infrastructure-pve
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`pve.woitzik.dev`) && PathPrefix(`/`)
    kind: Rule
    services:
    - name: external-pve
      port: 8006
      scheme: https
      serversTransport: insecure-transport
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# PBS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: infrastructure-pbs
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`backup.woitzik.dev`) && PathPrefix(`/`)
    kind: Rule
    services:
    - name: external-pbs
      port: 8007
      scheme: https
      serversTransport: insecure-transport
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Traefik Dash
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`traefik.woitzik.dev`) && PathPrefix(`/`)
    kind: Rule
    middlewares: [{name: authelia, namespace: apps}]
    services: [{name: api@internal, kind: TraefikService}]
  tls: {secretName: wildcard-woitzik-dev-tls}
