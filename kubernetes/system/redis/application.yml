apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-authelia
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 20.1.0
    chart: redis
    helm:
      values: |
        global:
          storageClass: "longhorn"
        architecture: standalone
        auth:
          enabled: true
          password: "redis-password-123"
        master:
          persistence:
            enabled: true
            size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
