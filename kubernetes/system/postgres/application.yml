apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-authelia
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 15.5.3
    chart: postgresql
    helm:
      values: |
        image:
          registry: docker.io
          repository: bitnami/postgresql
          tag: latest
        auth:
          existingSecret: "postgres-secret"
          passwordKey: "password"
        primary:
          persistence:
            enabled: true
            storageClass: "longhorn"
            size: 8Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true