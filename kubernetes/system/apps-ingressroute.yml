---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-public
  namespace: kube-system
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`traefik.woitzik.dev`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: authelia
          namespace: apps
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: wildcard-woitzik-dev-tls
