# Authelia
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: auth-final
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`auth.woitzik.dev`)
    kind: Rule
    services: [{name: authelia, port: 9091}]
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Homepage
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-final
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`home.woitzik.dev`)
    kind: Rule
    middlewares: [{name: authelia}]
    services: [{name: homepage, port: 80}]
  tls: {secretName: wildcard-woitzik-dev-tls}
