apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: apps-paperless
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`docs.woitzik.dev`)
      kind: Rule
      middlewares:
        - name: authelia
          namespace: apps
      services:
        - name: paperless
          namespace: apps
          port: 8000
  tls:
    secretName: wildcard-woitzik-dev-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: apps-ai
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ai.woitzik.dev`)
      kind: Rule
      middlewares:
        - name: authelia
          namespace: apps
      services:
        - name: open-webui
          namespace: apps
          port: 8080
  tls:
    secretName: wildcard-woitzik-dev-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: apps-home
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
