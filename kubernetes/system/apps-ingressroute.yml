apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: apps-home
  namespace: apps
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`home.woitzik.dev`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: authelia
      services:
        - name: homepage
          port: 80
  tls:
    secretName: wildcard-woitzik-dev-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
