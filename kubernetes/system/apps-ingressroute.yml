---
# Proxmox (PVE)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pve-final
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`pve.woitzik.dev`)
    kind: Rule
    middlewares:
      - name: websockets
    services:
      - name: external-pve
        port: 8006
        scheme: https
        serversTransport: insecure-transport
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Proxmox Backup (PBS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pbs-final
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`backup.woitzik.dev`)
    kind: Rule
    middlewares:
      - name: websockets
    services:
      - name: external-pbs
        port: 8007
        scheme: https
        serversTransport: insecure-transport
        passHostHeader: true
  tls: {secretName: wildcard-woitzik-dev-tls}
---
# Uptime Kuma
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: status-final
  namespace: monitoring
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`status.woitzik.dev`)
    kind: Rule
    middlewares:
      - name: authelia
      - name: websockets
        namespace: apps
    services: [{name: uptime-kuma, port: 3001}]
  tls: {secretName: wildcard-woitzik-dev-tls}
