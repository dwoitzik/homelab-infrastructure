apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-webserver-ingress
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-webserver-svc
            port:
              number: 80
