version: 3

projects:
  - name: network
    dir: terraform/stacks/network
    terraform_version: 1.10.5
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"

  - name: proxmox
    dir: terraform/stacks/proxmox
    terraform_version: 1.10.5
    workspace: default
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "*.tfvars"
