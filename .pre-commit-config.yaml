repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: ^ansible/roles/monitoring_core/templates/snmp\.yml\.j2$

  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform fmt
        description: Automatically formats Terraform files to standard style.
        entry: terraform fmt
        language: system
        files: \.tf$
        pass_filenames: true

      - id: ansible-lint
        name: Ansible Lint
        description: Enforces Ansible best practices and fully qualified collection names.
        entry: ansible-lint
        language: system
        files: ^ansible/.*\.(yml|yaml)$
        pass_filenames: false
        args: ["ansible/"]

      - id: tflint
        name: TFLint
        description: Check for Terraform errors and best practices.
        entry: tflint
        language: system
        files: \.tf$
        pass_filenames: false
        args: ["--recursive"]

      - id: yamllint
        name: YAML Lint
        description: Check YAML files for syntax and style.
        entry: yamllint
        language: system
        types: [yaml]
        args: [-d, "{extends: relaxed, rules: {line-length: disable}}"]
