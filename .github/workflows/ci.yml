name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_CLOUD_ORGANIZATION: "YOUR_ORG_NAME"
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  terraform-network:
    name: Terraform / network
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/stacks/network

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: tflint

  ansible:
    name: Ansible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint ansible-core

      - name: Install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Write vault password file
        run: printf '%s' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.ansible_vault_pass

      - name: ansible-lint
        run: ansible-lint
        working-directory: ansible
