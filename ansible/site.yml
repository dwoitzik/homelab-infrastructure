---
- name: Provision Base OS and Docker infrastructure
  hosts: nodes
  become: yes
  vars_files:
    - vars/secrets.yml
  roles:
    - common
    - docker
    - watchtower
    - monitoring_agent

- name: Provision HA Core Services
  hosts: rpi_nodes
  become: yes
  vars_files:
    - vars/secrets.yml
  roles:
    - rpi_optimize
    - keepalived
    - adguard
    - unbound
    - nginx-proxy-manager

- name: Provision Application Services
  hosts: app_nodes
  become: yes
  vars_files:
    - vars/secrets.yml
  roles:
    - vaultwarden
    - mikrodash
    - monitoring_core

- name: Provision DMZ External Proxy
  hosts: dmz_proxies
  become: yes
  vars_files:
    - vars/secrets.yml
  roles:
    - nginx-proxy-manager

- name: Provision DMZ Game Servers
  hosts: dmz_games
  become: yes
  vars_files:
    - vars/secrets.yml
  roles:
    - minecraft
