---
- name: Provision Base OS and Docker infrastructure
  hosts: nodes
  become: true
  roles:
    - common
    - docker
    - watchtower
    - monitoring_agent

- name: Provision HA Core Services & Gateway
  hosts: rpi_nodes
  become: true
  pre_tasks:
    - name: Stop Nginx Proxy Manager Docker stack
      community.docker.docker_compose_v2:
        project_src: /opt/npm
        state: absent
      failed_when: false

  roles:
    - rpi_optimize
    - keepalived
    - adguard
    - unbound
    - haproxy

- name: Provision Management Services
  hosts: mgmt_nodes
  become: true
  roles:
    - pbs

- name: Provision Application Services
  hosts: app_nodes
  become: true
  roles:
    # - minio         # Migrated to K3s
    # - vaultwarden   # Migrated to K3s
    # - mikrodash      # Migrated to K3s
    # - monitoring_core # Migrated to K3s
    # - atlantis       # Migrated to K3s
    - cloudflared
    # - paperless     # Migrated to K3s
    # - open_webui    # Migrated to K3s

# - name: Provision Authelia
#   hosts: app_nodes
#   become: true
#   roles:
#     - authelia      # Migrated to K3s

- name: Provision DMZ External Proxy
  hosts: dmz_proxies
  become: true
  roles:
    - nginx_proxy_manager
    - crowdsec_bouncer

- name: Provision DMZ Game Servers
  hosts: dmz_games
  become: true
  roles:
    - minecraft

- name: Provision AI & LLM Services
  hosts: ai_nodes
  become: true
  roles:
    - ollama
