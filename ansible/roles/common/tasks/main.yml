---
- name: Ensure the correct hostname is set
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts with the new hostname
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

- name: Perform system update (apt-get update & upgrade)
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Perform system update (apt-get update & upgrade)
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Set timezone to Europe/Berlin
  timezone:
    name: Europe/Berlin

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present

- name: Ensure unattended-upgrades is enabled and running
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: '0644'

- name: Optimize kernel network buffers for Unbound
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
  with_dict:
    net.core.rmem_max: "4194304"
    net.core.wmem_max: "4194304"
