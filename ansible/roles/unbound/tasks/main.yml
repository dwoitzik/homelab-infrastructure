- name: Create Unbound configuration directory
  file:
    path: /opt/unbound/conf
    state: directory
    mode: '0755'

- name: Deploy Unbound configuration
  template:
    src: unbound.conf.j2
    dest: /opt/unbound/conf/unbound.conf
    mode: '0644'
  notify: Restart Unbound

- name: Deploy Unbound Docker Compose stack
  copy:
    dest: /opt/unbound/docker-compose.yml
    mode: '0644'
    content: |
      services:
        unbound:
          image: klutchell/unbound:latest
          container_name: unbound
          restart: unless-stopped
          ports:
            - "5335:53/udp"
            - "5335:53/tcp"
          healthcheck:
            test: ["CMD", "dig", "+short", "@127.0.0.1", "-p", "5335", "google.com"]
            interval: 30s
            timeout: 10s
            retries: 3
          labels:
            - "autoheal=true"
          volumes:
            - /opt/unbound/conf/unbound.conf:/etc/unbound/unbound.conf

        autoheal:
          image: willfarrell/autoheal:latest
          container_name: autoheal
          restart: always
          environment:
            - AUTOHEAL_CONTAINER_LABEL=autoheal
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock
  notify: Restart Unbound

- name: Ensure Unbound and Autoheal are running
  community.docker.docker_compose_v2:
    project_src: /opt/unbound
    state: present
