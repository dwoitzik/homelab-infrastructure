---
- name: Ensure monitoring infrastructure directory exists
  ansible.builtin.file:
    path: /opt/docker/monitoring
    state: directory
    mode: '0755'

- name: Deploy SNMP exporter configuration
  ansible.builtin.template:
    src: snmp.yml.j2
    dest: /opt/docker/monitoring/snmp.yml
    mode: '0644'
  notify: Reload monitoring services

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /opt/docker/monitoring/prometheus.yml
    mode: '0644'
  notify: Reload monitoring services

- name: Deploy monitoring docker-compose stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/docker/monitoring/docker-compose.yml
    mode: '0644'

- name: Ensure monitoring stack is running
  community.docker.docker_compose_v2:
    project_src: /opt/docker/monitoring
    state: present
