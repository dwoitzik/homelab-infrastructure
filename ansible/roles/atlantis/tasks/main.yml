---
- name: Create Atlantis directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ atlantis_base_dir }}"
    - "{{ atlantis_base_dir }}/data"

- name: Set correct ownership on Atlantis data directory
  ansible.builtin.file:
    path: "{{ atlantis_base_dir }}/data"
    state: directory
    owner: "100"
    group: "1000"
    mode: "0755"

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ atlantis_base_dir }}/docker-compose.yml"
    mode: "0640"
  notify: Restart Atlantis

- name: Template environment file
  ansible.builtin.template:
    src: atlantis.env.j2
    dest: "{{ atlantis_base_dir }}/.env"
    mode: "0600"
  notify: Restart Atlantis

- name: Template Atlantis repo config
  ansible.builtin.template:
    src: repos.yaml.j2
    dest: "{{ atlantis_base_dir }}/repos.yaml"
    mode: "0644"
  notify: Restart Atlantis

- name: Deploy Atlantis stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ atlantis_base_dir }}"
  changed_when: false
