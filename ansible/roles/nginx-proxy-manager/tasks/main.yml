---
- name: Ensure base Nginx Proxy Manager directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/npm
    - /opt/npm/data
    - /opt/npm/letsencrypt

- name: Ensure CrowdSec directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/npm/crowdsec
    - /opt/npm/crowdsec/config
    - /opt/npm/crowdsec/data
  when: npm_enable_crowdsec | default(false) | bool

- name: Get docker group info
  ansible.builtin.getent:
    key: docker
    database: group
  register: docker_group_info

- name: Set docker_gid fact
  ansible.builtin.set_fact:
    docker_gid: "{{ getent_group.docker[1] }}"

- name: Deploy Nginx Proxy Manager docker-compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/npm/docker-compose.yml
    mode: '0644'

- name: Ensure Nginx Proxy Manager stack is running
  community.docker.docker_compose_v2:
    project_src: /opt/npm
    state: present
