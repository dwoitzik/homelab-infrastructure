---
- name: Purge Proxmox Enterprise repository files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pbs-enterprise.list
    - /etc/apt/sources.list.d/pbs-enterprise.sources
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/pve-enterprise.sources

- name: Remove enterprise lines from main sources.list
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: '.*enterprise\.proxmox\.com.*'
    state: absent

- name: Install gnupg and ca-certificates
  ansible.builtin.apt:
    name:
      - gnupg
      - ca-certificates
    state: present
    update_cache: true

- name: Download Proxmox release key
  ansible.builtin.get_url:
    url: https://enterprise.proxmox.com/debian/proxmox-release-trixie.gpg
    dest: /etc/apt/trusted.gpg.d/proxmox-release-trixie.gpg
    mode: '0644'

- name: Add Proxmox Backup Server repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pbs trixie pbs-no-subscription"
    state: present
    filename: pbs

- name: Install Proxmox Backup Server package
  ansible.builtin.apt:
    name: proxmox-backup-server
    state: present

- name: Add bind mount to PBS container configuration on PVE host
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/110.conf"
    line: "mp0: /mnt/pbs-storage,mp=/mnt/backups"
    state: present
  delegate_to: 10.0.10.10
  vars:
    ansible_user: root

- name: Force restart PBS Container
  ansible.builtin.shell: pct stop 110 && sleep 3 && pct start 110
  delegate_to: 10.0.10.10
  vars:
    ansible_user: root
  changed_when: true

- name: Wait for PBS container to wake up
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: 60

- name: Ensure mount point directory inside container exists
  ansible.builtin.file:
    path: /mnt/backups
    state: directory
    mode: "0755"

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    mode: "0600"

- name: Deploy pbs-to-gdrive sync script
  ansible.builtin.template:
    src: pbs-to-gdrive.sh.j2
    dest: /usr/local/bin/pbs-to-gdrive.sh
    mode: "0750"

- name: Configure rclone sync cron job
  ansible.builtin.cron:
    name: "PBS to GDrive offsite backup"
    minute: "0"
    hour: "4"
    job: "/usr/local/bin/pbs-to-gdrive.sh >> /dev/null 2>&1"
    user: root
    state: present
