---

- name: Add bind mount to PBS container configuration on PVE host
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/110.conf"
    line: "mp0: /mnt/pbs-storage,mp=/mnt/backups"
    state: present
  delegate_to: 10.0.10.10
  vars:
    ansible_user: root

- name: Force restart PBS Container to apply mount point
  ansible.builtin.shell: pct stop 110 && sleep 3 && pct start 110
  delegate_to: 10.0.10.10
  vars:
    ansible_user: root
  failed_when: false
  changed_when: true

- name: Ensure mount point directory inside container exists
  ansible.builtin.file:
    path: /mnt/backups
    state: directory
    mode: "0755"

- name: Install rclone
  ansible.builtin.apt:
    name: rclone
    state: present
    update_cache: true

- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    mode: "0700"

- name: Deploy rclone config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    mode: "0600"

- name: Deploy pbs-to-gdrive sync script
  ansible.builtin.template:
    src: pbs-to-gdrive.sh.j2
    dest: /usr/local/bin/pbs-to-gdrive.sh
    mode: "0750"

- name: Configure rclone sync cron job
  ansible.builtin.cron:
    name: "PBS to GDrive offsite backup"
    minute: "0"
    hour: "4"
    job: "/usr/local/bin/pbs-to-gdrive.sh >> /dev/null 2>&1"
    user: root
    state: present
