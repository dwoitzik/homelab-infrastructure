---
- name: Ensure Vaultwarden directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/vaultwarden
    - /opt/vaultwarden/vw-data

- name: Deploy Vaultwarden docker-compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/vaultwarden/docker-compose.yml
    mode: '0644'

- name: Ensure Vaultwarden container is running
  community.docker.docker_compose_v2:
    project_src: /opt/vaultwarden
    state: present
