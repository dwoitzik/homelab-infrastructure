---
- name: Ensure Authelia config directory exists
  ansible.builtin.file:
    path: /opt/docker/authelia/config
    state: directory
    mode: '0750'
    owner: root
    group: root

- name: Deploy Authelia configuration file
  ansible.builtin.template:
    src: configuration.yml.j2
    dest: /opt/docker/authelia/config/configuration.yml
    mode: '0600'
  notify: Restart Authelia

- name: Deploy Authelia users file
  ansible.builtin.template:
    src: users.yml.j2
    dest: /opt/docker/authelia/config/users.yml
    mode: '0600'
  notify: Restart Authelia

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/docker/authelia/docker-compose.yml
    mode: '0640'

- name: Start Authelia container
  community.docker.docker_compose_v2:
    project_src: /opt/docker/authelia
    state: present