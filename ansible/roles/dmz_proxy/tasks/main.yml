---
- name: Ensure configuration directories exist for NPM and CrowdSec
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/npm
    - /opt/npm/data
    - /opt/npm/letsencrypt
    - /opt/npm/crowdsec
    - /opt/npm/crowdsec/config
    - /opt/npm/crowdsec/data

- name: Deploy NPM and CrowdSec docker-compose.yml
  ansible.builtin.copy:
    dest: /opt/npm/docker-compose.yml
    content: |
      services:
        npm:
          image: 'jc21/nginx-proxy-manager:latest'
          container_name: npm-dmz
          restart: unless-stopped
          ports:
            - '80:80'
            - '81:81'
            - '443:443'
          volumes:
            - ./data:/data
            - ./letsencrypt:/etc/letsencrypt
        crowdsec:
          image: crowdsecurity/crowdsec:latest
          container_name: crowdsec
          restart: unless-stopped
          environment:
            COLLECTIONS: "crowdsecurity/nginx crowdsecurity/http-cve"
          volumes:
            - ./crowdsec/data:/var/lib/crowdsec/data
            - ./crowdsec/config:/etc/crowdsec
            - ./data/logs:/var/log/npm:ro
    mode: '0644'

- name: Start NPM and CrowdSec stack via Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt/npm
    state: present
