---
- name: Ensure MikroDash directory exists
  ansible.builtin.file:
    path: /opt/mikrodash
    state: directory
    mode: '0755'

- name: Deploy MikroDash docker-compose configuration
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/mikrodash/docker-compose.yml
    mode: '0644'
  notify: Restart MikroDash

- name: Ensure MikroDash is running
  community.docker.docker_compose_v2:
    project_src: /opt/mikrodash
    state: present
