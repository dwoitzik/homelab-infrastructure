---
- name: Create AdGuard Home directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop:
    - /opt/adguardhome/work
    - /opt/adguardhome/conf

- name: Deploy AdGuard Home Docker Compose file
  ansible.builtin.copy:
    dest: /opt/adguardhome/docker-compose.yml
    content: |
      services:
        adguardhome:
          image: adguard/adguardhome
          container_name: adguardhome
          restart: always
          network_mode: host
          volumes:
            - /opt/adguardhome/work:/opt/adguardhome/work
            - /opt/adguardhome/conf:/opt/adguardhome/conf
            - /opt/npm/letsencrypt:/opt/npm/letsencrypt:ro
    mode: '0644'
  notify: Restart AdGuard Home

- name: Start AdGuard Home container
  community.docker.docker_compose_v2:
    project_src: /opt/adguardhome
    state: restarted

- name: Deploy AdGuardHome-Sync on replica node
  when: inventory_hostname == 'rpi-srv-02'
  block:
    - name: Create Sync directory
      ansible.builtin.file:
        path: /opt/adguardhome-sync
        state: directory
        mode: '0755'

    - name: Deploy Sync Docker Compose
      ansible.builtin.copy:
        dest: /opt/adguardhome-sync/docker-compose.yml
        content: |
          services:
            adguardhome-sync:
              image: ghcr.io/bakito/adguardhome-sync
              container_name: adguardhome-sync
              restart: unless-stopped
              environment:
                - ORIGIN_URL=http://10.0.20.2:3001
                - ORIGIN_USERNAME=dw
                - ORIGIN_PASSWORD={{ adguard_ui_password }}
                - REPLICA_URL=http://10.0.20.3:3001
                - REPLICA_USERNAME=dw
                - REPLICA_PASSWORD={{ adguard_ui_password }}
                - CRON=*/5 * * * * # Sync every 5 minutes
        mode: '0644'

    - name: Start AdGuardHome-Sync
      community.docker.docker_compose_v2:
        project_src: /opt/adguardhome-sync
        state: present
